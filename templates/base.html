<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeatGuard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav class="top-nav">
    <a href="/" class="nav-logo">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="HeatGuard" style="height: 32px; width: 32px; border-radius: 8px; object-fit: cover;">
        <div class="nav-logo-text">
            <h1>HeatGuard</h1>
            <p>Heat Risk Intelligence</p>
        </div>
    </a>

    <div class="nav-links">
        <a href="/" class="{{ 'active' if request.path == '/' else '' }}">Heat risk</a>
        <a href="/hydration" class="{{ 'active' if request.path == '/hydration' else '' }}">Hydration</a>
        <a href="/map" class="{{ 'active' if request.path == '/map' else '' }}">Cool route</a>
        <a href="/emergency" class="{{ 'active' if request.path == '/emergency' else '' }}">Emergency</a>
    </div>

    <div class="nav-right">
        <a href="/profile" style="width:34px; height:34px; border-radius:50%; background:#1e3a5f; color:#60a5fa; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; text-decoration:none;">AK</a>
    </div>
</nav>

{% block content %}{% endblock %}

</body>
</html>
